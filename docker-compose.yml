version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stock_planner_db
    environment:
      POSTGRES_DB: stock_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockplanner123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
